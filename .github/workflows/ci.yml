name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bharatflow
      ENCRYPTION_SECRET: 0123456789abcdef0123456789abcdef
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_VIEWER_URL: http://localhost:3001
      NODE_OPTIONS: --no-node-snapshot
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Read Bun version
        id: bun-version
        run: |
          BUN_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1]")
          echo "version=$BUN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build landing content collections
        run: bunx @content-collections/cli build --config content-collections.ts
        working-directory: apps/landing-page

      - name: Check Nx project references
        run: |
          if bunx nx sync:check; then
            echo "Nx project references are in sync."
          else
            bunx nx sync
            git diff --exit-code
          fi

      - name: Typecheck
        run: bunx nx typecheck
